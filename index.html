<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Resolve every relative URL from the site root, so clean routes like
       /ideas/my-note don't break the script/style/fetch paths below. -->
  <base href="/">
  <title>Guy Gilad</title>
  <link rel="stylesheet" href="style.css">
  <!-- Markdown renderer (home intro + posts) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="script.js" defer></script>
  <script src="blog.js" defer></script>
</head>
<body>
  <div class="container">
    <!-- Sidebar loads dynamically -->
    <div id="sidebar-container"></div>

    <!-- This single shell serves both the home page (/) and every post
         (/about, /ideas/my-note, …); blog.js shows one view per route. -->
    <main class="content">
      <!-- Home view: intro + list of posts, newest first -->
      <section id="home-view">
        <div class="home-intro" id="home-intro"></div>
        <h2>Posts</h2>
        <div id="post-list">
          <p>Loading posts…</p>
        </div>
      </section>

      <!-- Post view: a single rendered post -->
      <article id="post-view" hidden>
        <p class="post-folder" id="post-folder"></p>
        <time class="post-date" id="post-meta-date"></time>
        <div id="post-content"></div>
      </article>
    </main>
  </div>
</body>
</html>
